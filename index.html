<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    :root {
      --primary-green: #2D5A27;
      --light-green: #F0F7F0;
      --border-color: #E0E0E0;
      --white: #FFFFFF;
    }

    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background-color: var(--light-green);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: #333;
    }

    .container {
      background: var(--white);
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 400px;
    }

    h2 {
      color: var(--primary-green);
      text-align: center;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }

    .input-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      font-weight: 500;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 1rem;
      font-family: inherit;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary-green);
    }

    button {
      width: 100%;
      padding: 14px;
      background-color: var(--primary-green);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #1e3d1a;
    }

    /* 팝업 스타일 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal {
      background: white;
      padding: 24px;
      border-radius: 12px;
      text-align: center;
      width: 80%;
      max-width: 300px;
    }

    .modal p { margin-bottom: 20px; font-weight: 500; }
    
    .modal-btns { display: flex; gap: 10px; }
    
    .btn-cancel { background: #ccc; }
    .btn-cancel:hover { background: #bbb; }

    #loading {
      display: none;
      text-align: center;
      margin-top: 10px;
      font-size: 0.8rem;
      color: var(--primary-green);
    }
  </style>
</head>
<body>

<div class="container">
  <h2>아이 행동 피드백</h2>
  <div class="input-group">
    <label>아이 이름</label>
    <input type="text" id="childName" placeholder="이름을 입력하세요">
  </div>
  <div class="input-group">
    <label>아이의 행동</label>
    <textarea id="behavior" rows="3" placeholder="어떤 행동을 했나요?"></textarea>
  </div>
  <button onclick="showPopup()">피드백 요청</button>
  <div id="loading">분석 중입니다. 잠시만 기다려주세요...</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <p>바로 해결해 드릴까요?</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closePopup()">취소</button>
      <button onclick="submitData()">해결</button>
    </div>
  </div>
</div>

<script>
  function showPopup() {
    const name = document.getElementById('childName').value;
    const behavior = document.getElementById('behavior').value;
    
    if(!name || !behavior) {
      alert("이름과 행동을 모두 입력해주세요.");
      return;
    }
    document.getElementById('modalOverlay').style.display = 'flex';
  }

  function closePopup() {
    document.getElementById('modalOverlay').style.display = 'none';
  }

  function submitData() {
    const name = document.getElementById('childName').value;
    const behavior = document.getElementById('behavior').value;
    
    closePopup();
    document.getElementById('loading').style.display = 'block';

    google.script.run
      .withSuccessHandler(function(response) {
        document.getElementById('loading').style.display = 'none';
        alert("분석 완료! 시트를 확인해주세요.\n\n[피드백 요약]\n" + response.feedback);
        document.getElementById('childName').value = '';
        document.getElementById('behavior').value = '';
      })
      .withFailureHandler(function(err) {
        document.getElementById('loading').style.display = 'none';
        alert("오류가 발생했습니다: " + err);
      })
      .processFeedback(name, behavior);
  }
</script>

</body>
</html>
